spring.application.name=product-service
server.port=8081

# ── PostgreSQL ────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/product_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gila}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gila123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── MongoDB (import logs) ─────────────────────────────────────────────
spring.data.mongodb.uri=${SPRING_MONGODB_URI:mongodb://localhost:27017/ecommerce_logs}

# ── Multipart (CSV upload) ────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

management.endpoints.web.exposure.include=health,info
